vich_uploader:
    db_driver: orm

    mappings:
        coach_images:
            uri_prefix: /images/coaches
            upload_destination: "%kernel.project_dir%/public/images/coaches"
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        player_images:
            uri_prefix: /images/players
            upload_destination: "%kernel.project_dir%/public/images/players"
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
